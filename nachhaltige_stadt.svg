<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Hintergrund -->
  <rect width="900" height="700" fill="#f0f4f0"/>

  <!-- Titel -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a3a1a">🌿 Nachhaltige Stadt – Icograms Aufbau</text>

  <!-- ===== ENERGIEZONE (oben links) ===== -->
  <rect x="30" y="60" width="200" height="130" rx="12" fill="#fffde7" stroke="#f9a825" stroke-width="2"/>
  <text x="130" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#f57f17">⚡ Energiezone</text>
  <text x="130" y="108" text-anchor="middle" font-size="12" fill="#555">🌬️ Windkraftanlagen</text>
  <text x="130" y="128" text-anchor="middle" font-size="12" fill="#555">☀️ Solarpark</text>
  <text x="130" y="148" text-anchor="middle" font-size="12" fill="#555">💧 Wasserkraftwerk</text>
  <text x="130" y="168" text-anchor="middle" font-size="10" fill="#888">→ Wind Turbine, Solar Panel</text>

  <!-- ===== NATURZONE (oben rechts) ===== -->
  <rect x="670" y="60" width="200" height="130" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
  <text x="770" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">🌳 Naturzone</text>
  <text x="770" y="108" text-anchor="middle" font-size="12" fill="#555">🌲 Wald &amp; Parks</text>
  <text x="770" y="128" text-anchor="middle" font-size="12" fill="#555">🏞️ See / Fluss</text>
  <text x="770" y="148" text-anchor="middle" font-size="12" fill="#555">🌻 Stadtgärten</text>
  <text x="770" y="168" text-anchor="middle" font-size="10" fill="#888">→ Trees, Lake, Garden</text>

  <!-- ===== WOHNVIERTEL (mitte links) ===== -->
  <rect x="30" y="240" width="200" height="150" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="130" y="265" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1">🏠 Wohnviertel</text>
  <text x="130" y="288" text-anchor="middle" font-size="12" fill="#555">🏢 Wohnblöcke</text>
  <text x="130" y="308" text-anchor="middle" font-size="12" fill="#555">🌿 Grüne Dächer</text>
  <text x="130" y="328" text-anchor="middle" font-size="12" fill="#555">🌱 Vertikale Gärten</text>
  <text x="130" y="348" text-anchor="middle" font-size="12" fill="#555">🏡 Niedrigenergie-Haus</text>
  <text x="130" y="370" text-anchor="middle" font-size="10" fill="#888">→ Apartments, House</text>

  <!-- ===== STADTZENTRUM (mitte) ===== -->
  <rect x="290" y="210" width="320" height="200" rx="14" fill="#fce4ec" stroke="#c62828" stroke-width="2.5"/>
  <text x="450" y="238" text-anchor="middle" font-size="14" font-weight="bold" fill="#b71c1c">🏙️ Stadtzentrum</text>
  <text x="450" y="262" text-anchor="middle" font-size="12" fill="#555">🏫 Schule &amp; Bildung</text>
  <text x="450" y="282" text-anchor="middle" font-size="12" fill="#555">🏥 Krankenhaus</text>
  <text x="450" y="302" text-anchor="middle" font-size="12" fill="#555">🛒 Marktplatz</text>
  <text x="450" y="322" text-anchor="middle" font-size="12" fill="#555">🚉 ÖPNV-Knotenpunkt</text>
  <text x="450" y="342" text-anchor="middle" font-size="12" fill="#555">🚲 Fahrradstation</text>
  <text x="450" y="368" text-anchor="middle" font-size="10" fill="#888">→ School, Hospital, Market, Tram Stop</text>

  <!-- ===== GEWERBE (mitte rechts) ===== -->
  <rect x="670" y="240" width="200" height="150" rx="12" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2"/>
  <text x="770" y="265" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a148c">🏭 Gewerbe</text>
  <text x="770" y="288" text-anchor="middle" font-size="12" fill="#555">🏢 Bürogebäude</text>
  <text x="770" y="308" text-anchor="middle" font-size="12" fill="#555">🔧 Handwerk</text>
  <text x="770" y="328" text-anchor="middle" font-size="12" fill="#555">🌾 Urban Farming</text>
  <text x="770" y="348" text-anchor="middle" font-size="12" fill="#555">☁️ Kleines Datencenter</text>
  <text x="770" y="368" text-anchor="middle" font-size="10" fill="#888">→ Office, Factory (small)</text>

  <!-- ===== TRANSPORT (unten) ===== -->
  <rect x="200" y="470" width="500" height="130" rx="12" fill="#fff8e1" stroke="#e65100" stroke-width="2"/>
  <text x="450" y="495" text-anchor="middle" font-size="13" font-weight="bold" fill="#bf360c">🚊 Transport &amp; Mobilität</text>
  <text x="320" y="520" text-anchor="middle" font-size="12" fill="#555">🚋 Straßenbahn</text>
  <text x="450" y="520" text-anchor="middle" font-size="12" fill="#555">🚌 E-Bus</text>
  <text x="580" y="520" text-anchor="middle" font-size="12" fill="#555">🚲 Fahrradwege</text>
  <text x="320" y="545" text-anchor="middle" font-size="12" fill="#555">⚡ E-Ladepunkt</text>
  <text x="450" y="545" text-anchor="middle" font-size="12" fill="#555">🛤️ Fußwege</text>
  <text x="580" y="545" text-anchor="middle" font-size="12" fill="#555">🚗 Carsharing</text>
  <text x="450" y="572" text-anchor="middle" font-size="10" fill="#888">→ Tram, Bus, Bicycle Lane, EV Charger</text>

  <!-- ===== RECYCLING (unten links) ===== -->
  <rect x="30" y="470" width="155" height="130" rx="12" fill="#e0f2f1" stroke="#00695c" stroke-width="2"/>
  <text x="107" y="495" text-anchor="middle" font-size="12" font-weight="bold" fill="#004d40">♻️ Recycling</text>
  <text x="107" y="518" text-anchor="middle" font-size="11" fill="#555">🗑️ Sortierung</text>
  <text x="107" y="538" text-anchor="middle" font-size="11" fill="#555">🌿 Kompost</text>
  <text x="107" y="558" text-anchor="middle" font-size="11" fill="#555">💧 Regenwasser</text>
  <text x="107" y="578" text-anchor="middle" font-size="10" fill="#888">→ Recycling Center</text>

  <!-- ===== WASSER (unten rechts) ===== -->
  <rect x="715" y="470" width="155" height="130" rx="12" fill="#e1f5fe" stroke="#0277bd" stroke-width="2"/>
  <text x="793" y="495" text-anchor="middle" font-size="12" font-weight="bold" fill="#01579b">💧 Wasser</text>
  <text x="793" y="518" text-anchor="middle" font-size="11" fill="#555">🏗️ Wasserturm</text>
  <text x="793" y="538" text-anchor="middle" font-size="11" fill="#555">🌊 Kläranlage</text>
  <text x="793" y="558" text-anchor="middle" font-size="11" fill="#555">🌧️ Regenwasser</text>
  <text x="793" y="578" text-anchor="middle" font-size="10" fill="#888">→ Water Tower</text>

  <!-- ===== VERBINDUNGSPFEILE ===== -->
  <!-- Energie → Zentrum -->
  <line x1="230" y1="125" x2="290" y2="310" stroke="#f9a825" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <!-- Natur → Zentrum -->
  <line x1="670" y1="125" x2="610" y2="310" stroke="#388e3c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <!-- Wohnen → Zentrum -->
  <line x1="230" y1="315" x2="290" y2="315" stroke="#1565c0" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
  <!-- Gewerbe → Zentrum -->
  <line x1="670" y1="315" x2="610" y2="315" stroke="#6a1b9a" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-purple)"/>
  <!-- Zentrum → Transport -->
  <line x1="450" y1="410" x2="450" y2="470" stroke="#e65100" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>

  <!-- Pfeilspitzen -->
  <defs>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f9a825"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1565c0"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6a1b9a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e65100"/>
    </marker>
  </defs>

  <!-- Legende -->
  <rect x="30" y="630" width="840" height="55" rx="8" fill="#ffffff" stroke="#ccc" stroke-width="1"/>
  <text x="450" y="648" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Icograms-Kategorien:</text>
  <text x="450" y="668" text-anchor="middle" font-size="10" fill="#555">Buildings &amp; Architecture  |  Transportation &amp; Vehicles  |  Nature &amp; Environment  |  Industry &amp; Infrastructure  |  City &amp; Urban</text>

</svg>
